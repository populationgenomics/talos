site_name: Talos
site_description: Scalable, open-source variant prioritisation for automated reanalysis of rare disease genomic data.
site_url: https://populationgenomics.github.io/talos/
repo_url: https://github.com/populationgenomics/talos
repo_name: populationgenomics/talos
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

exclude_docs: |
  codebase_review_*.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Features: features.md
      - Pedigree & Phenotypes: Pedigree.md
      - Reanalysis: Reanalysis.md
  - Reference:
      - Talos Configuration: Configuration.md
      - Nextflow Configuration: NextflowConfiguration.md
  - Contributing:
      - Adding New Categories: AddingNewCategories.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/populationgenomics/talos
  generator: false

copyright: Copyright &copy; Centre for Population Genomics
