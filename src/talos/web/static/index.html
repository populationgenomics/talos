<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos — Runs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Talos</a>
        </div>
    </nav>
    <div class="container-fluid">
        <h2>Registered Runs</h2>

        <div id="runs-table-container"></div>

        <hr>
        <h4>Register a New Run</h4>
        <form id="register-run-form" class="row g-3 mb-4">
            <div class="col-md-3">
                <label for="label" class="form-label">Label</label>
                <input type="text" class="form-control" id="label" name="label" required>
            </div>
            <div class="col-md-4">
                <label for="json_path" class="form-label">JSON File Path</label>
                <input type="text" class="form-control" id="json_path" name="json_path" required>
            </div>
            <div class="col-md-2">
                <label for="dataset" class="form-label">Dataset</label>
                <input type="text" class="form-control" id="dataset" name="dataset">
            </div>
            <div class="col-md-3">
                <label for="notes" class="form-label">Notes</label>
                <input type="text" class="form-control" id="notes" name="notes">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Register Run</button>
                <span id="register-feedback" class="ms-3"></span>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    $(document).ready(function() {
        function loadRuns() {
            $.getJSON('/api/runs', function(runs) {
                if (!runs.length) {
                    $('#runs-table-container').html('<div class="alert alert-info">No runs registered yet. Use the form below to register a result file.</div>');
                    return;
                }
                var html = '<table class="table table-striped table-hover">';
                html += '<thead><tr><th>Label</th><th>Dataset</th><th>Run Date</th><th>Registered</th><th>Notes</th><th></th></tr></thead><tbody>';
                runs.forEach(function(run) {
                    html += '<tr>';
                    html += '<td><a href="/runs/' + run.id + '">' + escapeHtml(run.label) + '</a></td>';
                    html += '<td>' + escapeHtml(run.dataset) + '</td>';
                    html += '<td>' + escapeHtml(run.run_date) + '</td>';
                    html += '<td>' + escapeHtml(run.registered) + '</td>';
                    html += '<td>' + escapeHtml(run.notes) + '</td>';
                    html += '<td><button class="btn btn-sm btn-outline-danger delete-run-btn" data-run-id="' + run.id + '"><i class="bi bi-trash"></i></button></td>';
                    html += '</tr>';
                });
                html += '</tbody></table>';
                $('#runs-table-container').html(html);

                $('.delete-run-btn').on('click', function() {
                    var runId = $(this).data('run-id');
                    if (!confirm('Unregister this run? (Decisions are preserved.)')) return;
                    $.ajax({url: '/api/runs/' + runId, method: 'DELETE'}).done(function() { loadRuns(); });
                });
            });
        }

        loadRuns();

        $('#register-run-form').on('submit', function(e) {
            e.preventDefault();
            var feedback = $('#register-feedback');
            feedback.text('Registering...').removeClass('text-danger text-success');

            $.ajax({
                url: '/api/runs',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    label: $('#label').val(),
                    json_path: $('#json_path').val(),
                    dataset: $('#dataset').val(),
                    notes: $('#notes').val()
                })
            })
            .done(function() {
                feedback.text('Registered!').addClass('text-success');
                $('#register-run-form')[0].reset();
                loadRuns();
            })
            .fail(function(xhr) {
                var msg = 'Registration failed';
                try { msg = JSON.parse(xhr.responseText).detail; } catch(e) {}
                feedback.text(msg).addClass('text-danger');
            });
        });

        function escapeHtml(unsafe) {
            if (unsafe === undefined || unsafe === null) return '';
            return String(unsafe).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    });
    </script>
</body>
</html>
