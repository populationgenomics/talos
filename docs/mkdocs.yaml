site_name: Talos
site_url: 'https://populationgenomics.github.io/talos/'
theme:
  name: material
  favicon: assets/favicon.png
  logo: assets/logo-colour.svg
  icon:
    repo: fontawesome/brands/github-alt
  features:
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    # - navigation.instant.preview
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: '(prefers-color-scheme)'
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: pink
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: pink
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference
plugins:
  search:
  mkdocstrings:
    handlers:
      python:
        options:
          extensions:
            - griffe_typingdoc
          show_root_heading: true
          show_if_no_docstring: true
          preload_modules:
            - talos
          inherited_members: true
          members_order: source
          separate_signature: true
          unwrap_annotated: true
          filters:
            - '!^_'
          merge_init_into_class: true
          docstring_section_style: spacy
          signature_crossrefs: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true

markdown_extensions:
  # Python Markdown
  admonition:
  abbr:
  attr_list:
  footnotes:
  md_in_html:
  tables:
  toc:
    permalink: true
    anchorlink: true
    anchorlink_class: 'toclink'

  # Python Markdown Extensions
  pymdownx.magiclink:
  pymdownx.details:
  pymdownx.snippets:
  pymdownx.betterem:
  pymdownx.caret:
  pymdownx.highlight:
    line_spans: __span
  pymdownx.inlinehilite:
  pymdownx.keys:
  pymdownx.mark:
  pymdownx.superfences:
    custom_fences:
      - name: mermaid
        class: mermaid
        format: !!python/name:pymdownx.superfences.fence_code_format
  pymdownx.tilde:
  markdown.extensions.attr_list:

  # pymdownx blocks
  pymdownx.blocks.admonition:
    types:
      - note
      - attention
      - caution
      - danger
      - error
      - tip
      - hint
      - warning
      # Custom types
      - info
      - check
  pymdownx.blocks.details:
  pymdownx.blocks.tab:
    alternate_style: True

repo_name: populationgenomics/talos
repo_url: https://github.com/populationgenomics/talos
nav:
  - Reanalysis: Reanalysis.md
  - Pedigree: Pedigree.md
  - Talos Configuration: Configuration.md
  - NextFlow Configuration: NextflowConfiguration.md
  - New Categories: AddingNewCategories.md
  - Docker: Docker.md
  - Tests: Tests.md
  - Changelog: Changelog.md

extra:
  version:
    provider: mike
    alias: true
