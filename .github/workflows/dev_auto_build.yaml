name: Autobuild dev image

on: [pull_request]

permissions:
  id-token: write
  contents: read

# only build one set of images in the event of multiple pushes in quick succession
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

env:
  PROJECT: 'cpg-common'
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain
  CLOUDSDK_CORE_DISABLE_PROMPTS: 1
  DOCKER_PREFIX: 'australia-southeast1-docker.pkg.dev'
  IMAGES_PREFIX: 'australia-southeast1-docker.pkg.dev/cpg-common/images-dev'

jobs:
  get_next_version:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      matrix: ${{ steps.get_next_version.outputs.next_version }}
    steps:
      - name: 'Checkout repo'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref == 'refs/heads/main' && 'main' || github.event.ref }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - id: 'google-cloud-auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: "projects/1051897107465/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "gh-images-deployer@cpg-common.iam.gserviceaccount.com"

      - id: 'google-cloud-sdk-setup'
        name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT }}

      - name: 'Get current version'
        id: get_next_version
        run: |
          next_version=$(python .github/workflows/get_version.py)
          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"

  deploy_image_auto:
    runs-on: ubuntu-latest
    environment: production
    needs:
      - get_next_version
    if: ${{ needs.get_next_version.outputs.matrix != '{"include":[]}' && needs.get_next_version.outputs.matrix != '' && github.event.pull_request.draft == false }}
    strategy:
      matrix: ${{ fromJson(needs.get_next_version.outputs.matrix) }}
    steps:
      - name: 'checkout repo'
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - id: 'google-cloud-auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: "projects/1051897107465/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "gh-images-deployer@cpg-common.iam.gserviceaccount.com"

      - id: 'google-cloud-sdk-setup'
        name: 'Set up Cloud SDK'
        uses: google-github-actions/setup-gcloud@v2

      - name: 'gcloud docker auth'
        run: |
          gcloud auth configure-docker ${{ env.DOCKER_PREFIX }}

      - name: 'build image with get_next_version'
        run: |
          docker build . -f src/talos/cpg_internal_scripts/CPG_Dockerfile \
          --build-arg VERSION=${{ matrix.tag }} \
          --tag ${{ env.IMAGES_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}

      - name: 'Push to dev artifactory'
        run: |
          docker push "${{ env.IMAGES_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}" | tee push.log
          digest=$(grep 'digest:' push.log | grep -o 'sha256:[0-9a-f]*')
          echo ":package: Link to image:" >> $GITHUB_STEP_SUMMARY
          echo "https://console.cloud.google.com/artifacts/docker/cpg-common/australia-southeast1/images-dev/${{ matrix.name }}/$digest?project=cpg-common" >> $GITHUB_STEP_SUMMARY

      # The freshly-built image is still in the local Docker daemon. Re-tag to
      # what nextflow.config's params.container expects, then run the test
      # pipeline against the committed test/fixtures/ - no re-pull, no re-auth.
      - name: 'Re-tag image for the Nextflow test profile'
        run: |
          docker tag "${{ env.IMAGES_PREFIX }}/${{ matrix.name }}:${{ matrix.tag }}" talos:11.0.0

      - name: 'Set up Java for Nextflow'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 'Install Nextflow'
        run: |
          curl -fsSL https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -v

      - name: 'Run Talos pipeline against test fixtures'
        run: |
          nextflow run main.nf -c nextflow/test.config -ansi-log false

      - name: 'Validate result JSONs against expected snapshots'
        run: |
          set -euo pipefail
          shopt -s nullglob
          for cohort in needs_merge premerged; do
            actual_files=( test/_run_output/${cohort}_outputs/${cohort}_full_results_*.json )
            if [ ${#actual_files[@]} -eq 0 ]; then
              echo "::error::no result JSON found for cohort ${cohort}"
              exit 1
            fi
            python test/fixtures/validate_results.py \
              --actual "${actual_files[0]}" \
              --expected "test/fixtures/expected_results/${cohort}.json"
          done

      - name: 'Upload pipeline outputs'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ matrix.tag }}
          path: |
            test/_run_output/
            .nextflow.log
          retention-days: 7
